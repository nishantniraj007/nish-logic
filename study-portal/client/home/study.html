<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Portal — Nish-Logic</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: black;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            position: relative;
            overflow: hidden;
        }

        #matrix {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            opacity: 0.5;
        }

        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid #0f0;
            border-radius: 10px;
            box-shadow: 0 0 50px rgba(0, 255, 0, 0.3);
            max-width: 620px;
            width: 90%;
            margin: 20px auto;
        }

        h1 {
            color: #0f0;
            font-size: clamp(1.5rem, 4vw, 2rem);
            margin-bottom: 0.5rem;
            text-shadow: 0 0 10px #0f0;
            letter-spacing: 4px;
        }

        .subtitle {
            color: #0f0;
            opacity: 0.6;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            letter-spacing: 2px;
        }

        .divider {
            border: none;
            border-top: 1px dashed #0f0;
            margin: 0 0 1.5rem 0;
            opacity: 0.4;
        }

        .btn-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        .btn {
            display: block;
            padding: 14px 20px;
            font-size: clamp(0.95rem, 2.5vw, 1.1rem);
            font-weight: bold;
            color: #0f0;
            background: #0a0a0a;
            border: 1px solid #0f0;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: all 0.2s ease;
            width: 100%;
        }

        .btn:hover {
            background: #0f0;
            color: black;
            box-shadow: 0 0 20px #0f0;
        }

        .btn.coming-soon {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }

        .back-btn {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 8px 20px;
            font-size: 0.85rem;
            color: #0f0;
            background: transparent;
            border: 1px dashed #0f0;
            border-radius: 5px;
            text-decoration: none;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
            opacity: 0.6;
            transition: all 0.2s ease;
        }

        .back-btn:hover {
            opacity: 1;
            background: rgba(0, 255, 0, 0.1);
        }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>

    <div class="content">
        <h1>STUDY PORTAL</h1>
        <div class="subtitle">— SELECT YOUR ARENA —</div>

        <hr class="divider">

        <div class="btn-grid">
            <a class="btn" href="marathon.html">🏃 MARATHON</a>
            <a class="btn" href="3om.html">⚔ 3 OVER MATCH</a>
            <a class="btn" href="expert-analyser.html">🔬 EXPERT ANALYSER</a>
            <a class="btn" href="book.html">📚 MCQ BOOK DOWNLOAD</a>
            <a class="btn" href="https://nishantniraj007.github.io/nish-logic/neet-quiz/" target="_blank">🧬 NEET UG</a>
            <a class="btn coming-soon" href="#">⚛ IIT JEE — COMING SOON</a>
            <a class="btn coming-soon" href="#">⚖ CLAT — COMING SOON</a>
        </div>

        <a class="back-btn" href="../index.html">← BACK</a>
    </div>

    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const chars = '01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン';
        const charArray = chars.split('');
        const fontSize = 14;
        const columns = canvas.width / fontSize;
        const drops = [];
        for (let x = 0; x < columns; x++) drops[x] = Math.floor(Math.random() * canvas.height / fontSize);

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0f0';
            ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < drops.length; i++) {
                const text = charArray[Math.floor(Math.random() * charArray.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(draw, 35);
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
