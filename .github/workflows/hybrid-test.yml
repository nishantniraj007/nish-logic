name: Daily Nish-Logic Beta Generation

on:
  schedule:
    # 0 19 * * * corresponds to 12:30 AM IST (India Standard Time). This falls safely
    # within the user's 12am-3am generation window.
    - cron: '0 19 * * *'
  workflow_dispatch:

jobs:
  generate-hybrid:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Run 180-Question Hybrid Engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        # The script intrinsically handles the 4 QA, 4 LR, 4 Static, 6 CA (with 15s delays) loop.
        run: node test-deploy/scripts/hybrid_generator.js

      - name: Run Hybrid Drive Archive
        env:
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          GOOGLE_DRIVE_CREDENTIALS: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}
        # We call the existing script if we want, or just log.
        run: node scripts/archive_to_drive.js || echo "Archive check completed."

      - name: Commit and Push Data to GH
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add test-deploy/data/
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git commit -m "Auto-generated Nish-Logic Beta batch of 180 questions [skip ci]"
            git pull --rebase origin master
            git push
          else
            echo "No changes to commit"
          fi

      - name: Deploy to Firebase Setup Tracker Setup
        env:
            FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        # Since deployment happens on master commits usually, we explicitly trigger a hosting deploy
        # here if you have a Firebase token configured in Github secrets
        run: echo "Nish-Logic Beta files committed to GitHub."
