name: Test Deploy Hybrid Generation

on:
  workflow_dispatch:
    inputs:
      difficulty:
        description: 'Difficulty Level (e.g. upsc, ssc, easy, medium)'
        required: true
        default: 'upsc'

jobs:
  generate-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Run Hybrid Generation Setup
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node test-deploy/scripts/hybrid_generator.js ${{ github.event.inputs.difficulty }}

      - name: Commit and Push Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add test-deploy/data/
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git commit -m "Auto-generated hybrid test for ${{ github.event.inputs.difficulty }} [skip ci]"
            git pull --rebase origin master
            git push
          else
            echo "No changes to commit"
          fi
