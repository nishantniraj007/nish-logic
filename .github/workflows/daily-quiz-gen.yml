name: Daily Quiz Generation

on:
  schedule:
    - cron: '30 18 * * *'
    - cron: '40 18 * * *'
    - cron: '50 18 * * *'
    - cron: '0 19 * * *'
    - cron: '10 19 * * *'
    - cron: '20 19 * * *'
    - cron: '30 19 * * *'
    - cron: '40 19 * * *'
    - cron: '50 19 * * *'
    - cron: '0 20 * * *'
  workflow_dispatch: # Allow manual triggers

jobs:
  generate-quiz:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Determine Batch Index
        id: determine-index
        run: |
          # Use minutes and hours to map to 0-9
          # 18:30 -> 0, 18:40 -> 1, 18:50 -> 2, 19:00 -> 3, ..., 20:00 -> 9
          MINUTE=$(date -u +%M)
          HOUR=$(date -u +%H)
          
          if [ "$HOUR" == "18" ]; then
            INDEX=$(awk "BEGIN {print int(($MINUTE - 30) / 10)}")
          elif [ "$HOUR" == "19" ]; then
            INDEX=$(awk "BEGIN {print int($MINUTE / 10) + 3}")
          elif [ "$HOUR" == "20" ]; then
            INDEX=9
          else
            INDEX=0 # fallback for manual triggers
          fi
          
          echo "INDEX=$INDEX" >> $GITHUB_ENV
          echo "Running batch index $INDEX"

      - name: Run Quiz Generation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate_daily_quiz.js ${{ env.INDEX }}

      - name: Run Drive Archive (on final batch)
        if: ${{ env.INDEX == '9' || github.event_name == 'workflow_dispatch' }}
        env:
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          GOOGLE_DRIVE_CREDENTIALS: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}
        run: node scripts/archive_to_drive.js || echo "Archive failed, continuing..."

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add games/3-over-match/data/
          # Don't fail if there's nothing to commit
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-generated quiz batch ${{ env.INDEX }} [skip ci]" && git push)
