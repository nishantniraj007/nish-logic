name: Daily Quiz Generation

on:
  schedule:
    - cron: '0 0 * * *'
    - cron: '10 0 * * *'
    - cron: '20 0 * * *'
    - cron: '30 0 * * *'
    - cron: '40 0 * * *'
    - cron: '50 0 * * *'
    - cron: '0 1 * * *'
    - cron: '10 1 * * *'
    - cron: '20 1 * * *'
    - cron: '30 1 * * *'
  workflow_dispatch: # Allow manual triggers

jobs:
  generate-quiz:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'server/package-lock.json'

      - name: Install Dependencies
        working-directory: ./server
        run: npm ci

      - name: Determine Batch Index
        id: determine-index
        run: |
          # Use minutes and hours to map to 0-9
          # 00:00 -> 0, 00:10 -> 1, ..., 01:30 -> 9
          MINUTE=$(date -u +%M)
          HOUR=$(date -u +%H)
          
          if [ "$HOUR" == "0" ]; then
            INDEX=$(awk "BEGIN {print int($MINUTE / 10)}")
          elif [ "$HOUR" == "1" ]; then
            INDEX=$(awk "BEGIN {print int($MINUTE / 10) + 6}")
          else
            INDEX=0 # fallback for manual triggers
          fi
          
          echo "INDEX=$INDEX" >> $GITHUB_ENV
          echo "Running batch index $INDEX"

      - name: Run Quiz Generation
        working-directory: ./server
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate_daily_quiz.js ${{ env.INDEX }}

      - name: Run Drive Archive (on final batch)
        if: env.INDEX == '9' || github.event_name == 'workflow_dispatch'
        working-directory: ./server
        env:
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          GOOGLE_DRIVE_CREDENTIALS: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}
        run: node scripts/archive_to_drive.js || echo "Archive failed, continuing..."

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add server/nish-logic/games/3-over-match/data/
          # Don't fail if there's nothing to commit
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-generated quiz batch ${{ env.INDEX }} [skip ci]" && git push)
