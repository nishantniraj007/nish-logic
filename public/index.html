<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nish-Logic</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #d8d8d8;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            position: relative;
        }

        /* Circuit board SVG background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(100,100,100,0.15) 1px, transparent 1px),
                linear-gradient(90deg, rgba(100,100,100,0.15) 1px, transparent 1px),
                linear-gradient(rgba(100,100,100,0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(100,100,100,0.08) 1px, transparent 1px);
            background-size: 80px 80px, 80px 80px, 20px 20px, 20px 20px;
            z-index: 0;
        }

        canvas {
            position: fixed;
            inset: 0;
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2.5rem;
        }

        .logo {
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 900;
            letter-spacing: 8px;
            color: #2a2a2a;
            text-transform: uppercase;
            position: relative;
        }

        .logo::after {
            content: 'NISH-LOGIC';
            position: absolute;
            inset: 0;
            color: transparent;
            -webkit-text-stroke: 1px rgba(80,80,80,0.4);
            filter: blur(8px);
            z-index: -1;
        }

        .tagline {
            font-size: clamp(0.7rem, 2vw, 0.95rem);
            color: #666;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .enter-btn {
            display: inline-block;
            padding: 14px 32px;
            font-size: clamp(0.65rem, 1.8vw, 0.85rem);
            font-weight: bold;
            color: #f0f0f0;
            background: #2a2a2a;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: all 0.3s ease;
            box-shadow: 4px 4px 0px #888, 0 0 20px rgba(0,0,0,0.2);
            white-space: nowrap;
        }

        .enter-btn:hover {
            background: #111;
            box-shadow: 6px 6px 0px #666, 0 0 30px rgba(0,0,0,0.3);
            transform: translate(-1px, -1px);
        }

        .enter-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #888;
        }

        /* Circuit node decorations */
        .nodes {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <canvas class="nodes" id="circuit"></canvas>

    <div class="content">
        <div class="logo">NISH-LOGIC</div>
        <div class="tagline">Serverless · Open · Zero Cost</div>
        <a href="https://nish-logic-60066876988.development.catalystserverless.in/app/index.html" class="enter-btn">
            Enter the Nish-Logic Ecosystem
        </a>
    </div>

    <script>
        const canvas = document.getElementById('circuit');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            drawCircuit();
        }

        function drawCircuit() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const W = canvas.width, H = canvas.height;
            const color = 'rgba(90,90,90,0.25)';
            ctx.strokeStyle = color;
            ctx.lineWidth = 1;

            // Draw random circuit-like lines
            const seed = 42;
            function rand(min, max, i) {
                return min + ((Math.sin(i * 127.1 + seed) * 0.5 + 0.5) * (max - min));
            }

            // Horizontal + vertical circuit traces
            for (let i = 0; i < 60; i++) {
                const x = rand(0, W, i * 3);
                const y = rand(0, H, i * 7);
                const len = rand(40, 180, i * 11);
                const horiz = i % 2 === 0;

                ctx.beginPath();
                ctx.moveTo(x, y);
                if (horiz) {
                    ctx.lineTo(x + len, y);
                    // right angle turn
                    const turnLen = rand(20, 80, i * 13);
                    ctx.lineTo(x + len, y + (i % 3 === 0 ? turnLen : -turnLen));
                } else {
                    ctx.lineTo(x, y + len);
                    const turnLen = rand(20, 80, i * 17);
                    ctx.lineTo(x + (i % 3 === 0 ? turnLen : -turnLen), y + len);
                }
                ctx.stroke();

                // Node dot at junction
                ctx.beginPath();
                ctx.arc(horiz ? x + len : x, horiz ? y : y + len, 3, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(80,80,80,0.35)';
                ctx.fill();
            }

            // Small diamond shapes scattered
            for (let i = 0; i < 15; i++) {
                const x = rand(50, W - 50, i * 19);
                const y = rand(50, H - 50, i * 23);
                const s = rand(6, 14, i * 29);
                ctx.beginPath();
                ctx.moveTo(x, y - s);
                ctx.lineTo(x + s, y);
                ctx.lineTo(x, y + s);
                ctx.lineTo(x - s, y);
                ctx.closePath();
                ctx.strokeStyle = 'rgba(80,80,80,0.3)';
                ctx.stroke();
            }

            // Small circles (IC pads)
            for (let i = 0; i < 20; i++) {
                const x = rand(30, W - 30, i * 31);
                const y = rand(30, H - 30, i * 37);
                ctx.beginPath();
                ctx.arc(x, y, rand(4, 8, i * 41), 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(80,80,80,0.2)';
                ctx.stroke();
            }

            // Triangle in center (like the screenshot)
            const cx = W / 2, cy = H / 2;
            const triSizes = [220, 150, 80];
            triSizes.forEach((size, idx) => {
                ctx.beginPath();
                ctx.moveTo(cx, cy - size);
                ctx.lineTo(cx + size * 0.866, cy + size * 0.5);
                ctx.lineTo(cx - size * 0.866, cy + size * 0.5);
                ctx.closePath();
                ctx.strokeStyle = `rgba(100,100,100,${0.15 - idx * 0.03})`;
                ctx.lineWidth = 1.5;
                ctx.stroke();
            });
        }

        window.addEventListener('resize', resize);
        resize();
    </script>
</body>
</html>
