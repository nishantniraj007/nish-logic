<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 200" width="100" height="200">
  <!-- Body/Uniform -->
  <rect x="25" y="85" width="50" height="70" rx="8" fill="#1e3a5f"/>
  <!-- School badge -->
  <rect x="30" y="92" width="14" height="10" rx="2" fill="#D4AF37" opacity="0.8"/>
  <!-- Head -->
  <ellipse cx="50" cy="55" rx="24" ry="28" fill="#c8956c"/>
  <!-- Hair -->
  <ellipse cx="50" cy="30" rx="24" ry="10" fill="#1a0a00"/>
  <rect x="26" y="30" width="48" height="8" fill="#1a0a00"/>
  <!-- Ears -->
  <ellipse cx="26" cy="55" rx="4" ry="6" fill="#c8956c"/>
  <ellipse cx="74" cy="55" rx="4" ry="6" fill="#c8956c"/>
  <!-- Eyes - bigger, younger look -->
  <ellipse cx="41" cy="52" rx="8" ry="7" fill="white"/>
  <ellipse cx="59" cy="52" rx="8" ry="7" fill="white"/>
  <circle cx="42" cy="53" r="4.5" fill="#1a0a00"/>
  <circle cx="60" cy="53" r="4.5" fill="#1a0a00"/>
  <circle cx="43" cy="51" r="1.5" fill="white"/>
  <circle cx="61" cy="51" r="1.5" fill="white"/>
  <!-- Eyebrows -->
  <path d="M34 44 Q41 41 48 44" stroke="#1a0a00" stroke-width="2" fill="none"/>
  <path d="M52 44 Q59 41 66 44" stroke="#1a0a00" stroke-width="2" fill="none"/>
  <!-- Nose -->
  <ellipse cx="50" cy="61" rx="3" ry="3.5" fill="#b07850"/>
  <!-- Mouth - smile -->
  <path d="M43 70 Q50 77 57 70" stroke="#8b5e3c" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Arms -->
  <rect x="5" y="88" width="22" height="11" rx="5" fill="#1e3a5f" transform="rotate(15 16 93)"/>
  <rect x="73" y="88" width="22" height="11" rx="5" fill="#1e3a5f" transform="rotate(-15 84 93)"/>
  <!-- Hands -->
  <ellipse cx="11" cy="115" rx="8" ry="6" fill="#c8956c"/>
  <ellipse cx="89" cy="115" rx="8" ry="6" fill="#c8956c"/>
  <!-- Legs -->
  <rect x="30" y="153" width="16" height="40" rx="5" fill="#1e3a5f"/>
  <rect x="54" y="153" width="16" height="40" rx="5" fill="#1e3a5f"/>
  <!-- Shoes -->
  <ellipse cx="38" cy="193" rx="12" ry="5" fill="#1a1a1a"/>
  <ellipse cx="62" cy="193" rx="12" ry="5" fill="#1a1a1a"/>
</svg>